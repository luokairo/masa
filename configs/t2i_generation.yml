common:
    output_path: /inspire/hdd/project/exploration-topic/public/ent/NIPS/ckpt
    pre_path: /inspire/hdd/project/exploration-topic/public/ent/NIPS/ckpt/t2i_generation
    log_path: /inspire/hdd/project/exploration-topic/public/ent/NIPS/logs
    save_per_iters: 1000
    use_bf16: 1
    use_fp16: 0
    use_fsdp: 1
    use_zero: 0
    random_seed: 1024
    log_interval: 1
    machines: 1
    task: 't2i'

optimize:
    max_epochs: 20
    warmup_epochs: 0.1

    lr: 1.0e-4
    lr_scheduler: 'cosine'
    optimizer: 'adamw'
    weight_decay: 0.05
    betas: [0.9, 0.95]
    eps: 1.0e-06

model:
    model_path: /inspire/hdd/project/exploration-topic/public/downloaded_ckpts/Janus/Janus-Pro-7B
    processor_path: /inspire/hdd/project/exploration-topic/public/downloaded_ckpts/Janus/Janus-Pro-7B

dataloader:
    und_data_path: /inspire/hdd/project/exploration-topic/public/ent/dataset/und/sharegpt4v/sharegpt4v_instruct_gpt4-vision_cap100k.json
    gen_data_path: /inspire/hdd/project/exploration-topic/public/ent/download_dataset/BLIP3o-60k/*.tar
    num_workers: 16
    prefetch_factor: 4
    sampler_shuffle: False
    tasks: [0,1]
    train:
        use_local_shuffle: True
        task1:
          batch_size: 4
          sample_ratio: 5
        task2:
          batch_size: 4
          sample_ratio: 5
        